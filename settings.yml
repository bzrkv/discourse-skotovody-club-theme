enable_guest_landing:
  default: true
  type: bool
  description: "Показывать .sktvd-landing hero на главной для неавторизованных юзеров"

enable_admin_banner:
  default: true
  type: bool
  description: "Показывать .sktvd-banner глобальный анонс сверху"

admin_banner_text:
  default: "Открыт Клуб Скотоводов. Это закрытое профессиональное сообщество — для регистрации заполните заявку."
  type: string
  description: "Текст в admin banner (HTML allowed)"

admin_banner_cta_text:
  default: "Подать заявку →"
  type: string
  description: "Текст CTA-ссылки в admin banner"

admin_banner_cta_url:
  default: "https://skotovody.com/club-zayavka/"
  type: string
  description: "Куда ведёт CTA — обычно application form на skotovody.com"

enable_slider:
  default: true
  type: bool
  description: "Показывать slider-герой на главной (контент — в настройке slides)"

slides:
  type: objects
  description: "Слайды героя-слайдера. Каждый слайд: тип (анонс/событие/партнёр), заголовок, описание, кнопки."
  default:
    - kind: announce
      tag: "Новости клуба"
      title: "Документы 2.0 — шаблоны под изменения ВетИС с 1 июня"
      description: "В разделе «Документы» — обновлённые шаблоны договоров, ветпаспортов и чек-листов. Авторы — практикующие юристы и ветврачи."
      cta_text: "Открыть раздел"
      cta_url: "/c/documents"
      cta_alt_text: "Подписаться"
      cta_alt_url: "/c/documents"
      watermark: "НОВОЕ"
    - kind: event
      tag: "Событие · оффлайн"
      title: "Полевой день «Скотовод-2026» — Брянская область"
      description: "Хозяйства Центра России собираются на демо-площадке: техника, расколы, генетика, обмен опытом. Бесплатно для участников клуба."
      event_when: "14 июня, 09:00 · Брянск, КФХ «Лесное»"
      cta_text: "Записаться"
      cta_url: "https://skotovody.com/club/"
      cta_alt_text: "Программа"
      cta_alt_url: "https://skotovody.com/club/"
      watermark: "14"
    - kind: partner
      tag: "Genex Russia · Реклама"
      title: "Семя быков-производителей с верифицированным EPD"
      description: "Скидка 15% участникам клуба до конца июня. Доставка по всем регионам, поддержка ИО-специалистов."
      cta_text: "Узнать больше"
      cta_url: "https://skotovody.com/club/"
      watermark: "GENEX"
    - kind: announce
      tag: "Анонс"
      title: "AMA с Мариной Власовой, ветврач к.б.н. — четверг 19:00"
      description: "Прямой эфир с разбором свежих случаев: нодулярный дерматит, антибиотикорезистентность, регионализация. Вопросы можно оставить заранее в теме."
      cta_text: "Записаться"
      cta_url: "/c/veterinary"
      cta_alt_text: "Открыть тему"
      cta_alt_url: "/c/veterinary"
      watermark: "AMA"
  schema:
    name: slide
    properties:
      kind:
        type: enum
        default: announce
        choices:
          - announce
          - event
          - partner
      tag:
        type: string
      title:
        type: string
        required: true
      description:
        type: string
      cta_text:
        type: string
      cta_url:
        type: string
      cta_alt_text:
        type: string
      cta_alt_url:
        type: string
      event_when:
        type: string
      watermark:
        type: string

pricing_url:
  default: "https://skotovody.com/club/"
  type: string
  description: "URL pricing-страницы на skotovody.com — куда ведут CTA «Подать заявку» из guest landing"

verified_badge_admin_emoji:
  default: "⚙️"
  type: string

verified_badge_expert_emoji:
  default: "🎓"
  type: string

verified_badge_farm_emoji:
  default: "🏡"
  type: string
